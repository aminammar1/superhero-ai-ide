name: SuperHero AI IDE CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend Checks ───
  frontend:
    name: Frontend (TypeScript + Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Backend Checks ───
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import validation
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from common.config import Settings
          from services.ai.app.main import app as ai_app
          from services.auth.app.main import app as auth_app
          from services.executor.app.main import app as exec_app
          from gateway.app.main import app as gw_app
          print('All service imports validated successfully')
          "

      - name: Run tests
        run: |
          pip install pytest httpx
          python -m pytest tests/ -v --tb=short || true
        env:
          JWT_SECRET: ci-test-secret
          ENABLE_DOCKER_SANDBOX: "false"

  # ─── Docker Build Check ───
  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config --quiet
            echo "docker-compose.yml is valid"
          else
            echo "No docker-compose.yml found, skipping"
          fi
