services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn gateway.app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      AI_SERVICE_URL: http://ai-service:8002
      VOICE_SERVICE_URL: http://voice-service:8003
      EXECUTOR_SERVICE_URL: http://executor-service:8004
      JWT_SECRET: ${JWT_SECRET:-superhero-dev-secret}
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - ai-service
      - voice-service
      - executor-service

  auth-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn services.auth.app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-superhero-dev-secret}
    ports:
      - "8001:8001"

  ai-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn services.ai.app.main:app --host 0.0.0.0 --port 8002
    env_file:
      - .env
    environment:
      AGENT_ROUTER_API_KEY: ${AGENT_ROUTER_API_KEY:-}
      AGENT_ROUTER_CHAT_MODELS: ${AGENT_ROUTER_CHAT_MODELS:-gpt-5,claude-sonnet-4-20250514}
      AGENT_ROUTER_CODE_MODELS: ${AGENT_ROUTER_CODE_MODELS:-gpt-5,claude-sonnet-4-20250514}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-coder:free}
      OPENROUTER_CHAT_MODELS: ${OPENROUTER_CHAT_MODELS:-qwen/qwen3-coder:free,openai/gpt-oss-120b:free,qwen/qwen3-next-80b-a3b-instruct:free,minimax/minimax-m2.5:free,meta-llama/llama-3.3-70b-instruct:free}
      OPENROUTER_CODE_MODELS: ${OPENROUTER_CODE_MODELS:-qwen/qwen3-coder:free,openai/gpt-oss-120b:free,qwen/qwen3-next-80b-a3b-instruct:free,minimax/minimax-m2.5:free,meta-llama/llama-3.3-70b-instruct:free}
      NVIDIA_AI_API_KEY: ${NVIDIA_AI_API_KEY:-}
      NVIDIA_AI_MODEL: ${NVIDIA_AI_MODEL:-meta/llama-3.3-70b-instruct}
      NVIDIA_CHAT_MODELS: ${NVIDIA_CHAT_MODELS:-meta/llama-3.3-70b-instruct,meta/llama-3.1-8b-instruct,nvidia/llama-3.1-nemotron-nano-8b-v1,nvidia/nemotron-mini-4b-instruct}
      NVIDIA_CODE_MODELS: ${NVIDIA_CODE_MODELS:-meta/llama-3.3-70b-instruct,meta/llama-3.1-8b-instruct,nvidia/llama-3.1-nemotron-nano-8b-v1,nvidia/nemotron-mini-4b-instruct}
    ports:
      - "8002:8002"

  voice-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn services.voice.app.main:app --host 0.0.0.0 --port 8003
    env_file:
      - .env
    environment:
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      VOICE_SPIDERMAN_ID: ${VOICE_SPIDERMAN_ID:-hero_spiderman}
      VOICE_BATMAN_ID: ${VOICE_BATMAN_ID:-hero_batman}
      VOICE_SUPERMAN_ID: ${VOICE_SUPERMAN_ID:-hero_superman}
      VOICE_IRONMAN_ID: ${VOICE_IRONMAN_ID:-hero_ironman}
    ports:
      - "8003:8003"

  executor-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn services.executor.app.main:app --host 0.0.0.0 --port 8004
    env_file:
      - .env
    environment:
      ENABLE_DOCKER_SANDBOX: "true"
      DOCKER_TIMEOUT_SECONDS: "20"
    ports:
      - "8004:8004"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
